basePath: /v1
definitions:
  domain.Artist:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  domain.Recording:
    properties:
      artist:
        $ref: '#/definitions/domain.Artist'
      concertDate:
        type: string
      createdAt:
        type: string
      description:
        type: string
      externalURL:
        type: string
      id:
        type: integer
      moderatedAt:
        type: string
      slug:
        type: string
      status:
        $ref: '#/definitions/domain.RecordingStatus'
      submittedAt:
        type: string
      thumbnailURL:
        type: string
      title:
        type: string
      youtubeID:
        type: string
    type: object
  domain.RecordingStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusApproved
    - StatusRejected
  handler.adminLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handler.adminLoginResponse:
    properties:
      expiresAt:
        type: string
      token:
        type: string
    type: object
  handler.createRecordingRequest:
    properties:
      artistName:
        type: string
      concertDate:
        type: string
      description:
        type: string
      externalURL:
        type: string
      title:
        type: string
    type: object
  handler.updateRecordingRequest:
    properties:
      artistName:
        type: string
      concertDate:
        type: string
      description:
        type: string
      externalURL:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  title: Dion API
  version: "1.0"
paths:
  /admin/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Admin credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.adminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adminLoginResponse'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "415":
          description: unsupported media type
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Admin login
      tags:
      - admin
  /admin/recordings/{id}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Recording ID
        in: path
        name: id
        required: true
        type: integer
      - description: Recording moderation update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateRecordingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Recording'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "415":
          description: unsupported media type
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update recording moderation state
      tags:
      - admin
  /admin/recordings/pending:
    get:
      parameters:
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Recording'
            type: array
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List pending recordings
      tags:
      - admin
  /artists:
    get:
      parameters:
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Artist'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: List artists
      tags:
      - artists
  /artists/{slug}:
    get:
      parameters:
      - description: Artist slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Artist'
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get artist by slug
      tags:
      - artists
  /artists/{slug}/recordings:
    get:
      parameters:
      - description: Artist slug
        in: path
        name: slug
        required: true
        type: string
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Recording'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: List recordings by artist slug
      tags:
      - recordings
  /recordings:
    get:
      parameters:
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Recording'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: List approved recordings
      tags:
      - recordings
    post:
      consumes:
      - application/json
      parameters:
      - description: Recording submission
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createRecordingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Recording'
        "400":
          description: bad request
          schema:
            type: string
        "415":
          description: unsupported media type
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Create recording submission
      tags:
      - recordings
  /recordings/{slug}:
    get:
      parameters:
      - description: Recording slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Recording'
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get recording by slug
      tags:
      - recordings
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
